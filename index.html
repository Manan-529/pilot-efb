<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="viMan">
    <title>viMan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
    <div id="nav-bar">
        <button id="btn-menu" class="menu-btn" aria-label="Menu">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <span class="nav-title">viMan</span>
    </div>

    <div id="sidebar-overlay"></div>
    <div id="sidebar">
        <button class="sidebar-item active" data-mode="atis">ATIS</button>
        <button class="sidebar-item" data-mode="scratchpad">ScratchPad</button>
        <button class="sidebar-item" data-mode="diagrams">Diagrams</button>
        <button class="sidebar-item" data-mode="documents">Documents</button>
        <button class="sidebar-item" data-mode="checklists">Checklists</button>
    </div>

    <div id="toolbar">
        <div class="tool-group">
            <button id="btn-pen" class="tool-btn active" title="Pen">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                </svg>
            </button>
            <button id="btn-eraser" class="tool-btn" title="Eraser">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.8 1.4c.8-.8 2-.8 2.8 0l5 5c.8.8.8 2 0 2.8L11 20"/>
                </svg>
            </button>
        </div>
        <div class="tool-group">
            <button id="btn-size" class="tool-btn size-btn" title="Pen Size">2 px</button>
        </div>
        <div class="tool-group">
            <button id="btn-undo" class="tool-btn" title="Undo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                </svg>
            </button>
            <button id="btn-redo" class="tool-btn" title="Redo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
                </svg>
            </button>
            <button id="btn-clear" class="tool-btn" title="Clear All">Clear</button>
        </div>
        <div class="tool-group">
            <button id="btn-save" class="tool-btn" title="Save as PNG">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            </button>
        </div>
        <div class="tool-group" id="theme-group" style="display:none;">
            <button id="btn-theme" class="tool-btn" title="Toggle Light/Dark">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="template-canvas"></canvas>
        <canvas id="drawing-canvas"></canvas>
    </div>

    <!-- Diagrams: organized by airport folders -->
    <div id="diagrams-container" style="display:none;">
        <div id="diagrams-header">
            <button id="btn-upload-diagram" class="tool-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span style="margin-left:6px; font-size:12px;">Upload</span>
            </button>
            <button id="btn-add-airport" class="tool-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    <line x1="12" y1="11" x2="12" y2="17"/>
                    <line x1="9" y1="14" x2="15" y2="14"/>
                </svg>
                <span style="margin-left:6px; font-size:12px;">Add Airport</span>
            </button>
            <button id="btn-back-airports" class="tool-btn" style="display:none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                <span style="margin-left:4px; font-size:12px;">Back</span>
            </button>
            <span id="diagrams-title" style="color:#8899aa; font-size:13px; font-weight:600; margin-left:8px;">Airports</span>
            <input type="file" id="diagram-file-input" accept="image/*,.pdf" multiple style="display:none;">
        </div>
        <div id="diagrams-grid"></div>
    </div>

    <!-- Documents: flat list -->
    <div id="documents-container" style="display:none;">
        <div id="documents-header">
            <button id="btn-upload-doc" class="tool-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span style="margin-left:6px; font-size:12px;">Upload</span>
            </button>
            <input type="file" id="doc-file-input" accept="image/*,.pdf" multiple style="display:none;">
        </div>
        <div id="documents-grid"></div>
    </div>

    <!-- Checklists: organized by aircraft -->
    <div id="checklists-container" style="display:none;">
        <div id="checklists-header">
            <button id="btn-upload-checklist" class="tool-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span style="margin-left:6px; font-size:12px;">Upload</span>
            </button>
            <button id="btn-add-aircraft" class="tool-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    <line x1="12" y1="11" x2="12" y2="17"/>
                    <line x1="9" y1="14" x2="15" y2="14"/>
                </svg>
                <span style="margin-left:6px; font-size:12px;">Add Aircraft</span>
            </button>
            <button id="btn-back-aircraft" class="tool-btn" style="display:none;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                <span style="margin-left:4px; font-size:12px;">Back</span>
            </button>
            <span id="checklists-title" style="color:#8899aa; font-size:13px; font-weight:600; margin-left:8px;">Aircraft</span>
            <input type="file" id="checklist-file-input" accept="image/*,.pdf" multiple style="display:none;">
        </div>
        <div id="checklists-grid"></div>
    </div>

    <!-- Shared viewer -->
    <div id="file-viewer" style="display:none;">
        <button id="btn-close-viewer">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <div id="viewer-content"></div>
    </div>

    <div id="page-bar">
        <div id="page-tabs"></div>
        <button id="btn-add-page" class="page-btn" title="New Page">+</button>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
